<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>営業ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F5;color:#1A1A1A;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:960px;padding:2rem 1.5rem;}
.logo{font-size:13px;color:#6B6B6B;margin-bottom:2.5rem;text-align:center;letter-spacing:0.05em;}
.title{font-size:28px;font-weight:600;text-align:center;margin-bottom:0.5rem;}
.subtitle{font-size:14px;color:#6B6B6B;text-align:center;margin-bottom:3rem;}
.cards{display:flex;flex-direction:column;gap:16px;}
@media(min-width:768px){.cards{flex-direction:row;gap:20px;}}
.card{flex:1;background:#fff;border-radius:16px;border:1.5px solid #E0E0E0;padding:28px 24px;text-decoration:none;color:#1A1A1A;display:flex;flex-direction:column;gap:12px;transition:border-color 0.15s,box-shadow 0.15s;}
.card:hover{border-color:#1D9E75;box-shadow:0 4px 16px rgba(29,158,117,0.12);}
.card-icon{font-size:32px;line-height:1;}
.card-name{font-size:17px;font-weight:600;}
.card-desc{font-size:13px;color:#6B6B6B;line-height:1.6;}
.card-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;margin-top:auto;}
.tag-green{background:#E1F5EE;color:#0F6E56;}
.tag-gray{background:#F0F0F0;color:#6B6B6B;}
.card-arrow{font-size:18px;color:#1D9E75;align-self:flex-end;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">NISA WALK</div>
  <div class="title">どこから始めますか？</div>
  <div class="subtitle">お客さまの状況に合わせてツールを選んでください</div>
  <div class="cards">
    <a class="card" href="dca-a.html">
      <div class="card-icon">🍎</div>
      <div class="card-name">ドルコスト平均法とは？</div>
      <div class="card-desc">リンゴの例えで「毎月同じ金額で買い続けるとお得な理由」をひと目で見せる</div>
      <div class="card-tag tag-green">NISAをまだ知らない方へ</div>
      <div class="card-arrow">→</div>
    </a>
    <a class="card" href="dca-b.html">
      <div class="card-icon">🍎</div>
      <div class="card-name">ドルコスト平均法とは？（ステップ解説）</div>
      <div class="card-desc">順番に説明しながら一緒に理解する。営業マンが会話のテンポをコントロールしやすい</div>
      <div class="card-tag tag-green">NISAをまだ知らない方へ</div>
      <div class="card-arrow">→</div>
    </a>
    <a class="card" href="simulator.html">
      <div class="card-icon">📈</div>
      <div class="card-name">NISAシミュレーター</div>
      <div class="card-desc">年齢・積立額を入力して複利の効果をグラフで確認する。複数のシナリオも比較できる</div>
      <div class="card-tag tag-gray">NISAに興味がある方へ</div>
      <div class="card-arrow">→</div>
    </a>
  </div>
</div>
</body>
</html>
