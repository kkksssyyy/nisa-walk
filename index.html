<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NISAシミュレーター</title>
<style>
:root{
  --color-text-primary:#1A1A1A;
  --color-text-secondary:#6B6B6B;
  --color-background-primary:#FFFFFF;
  --color-background-secondary:#F5F5F5;
  --color-background-tertiary:#EBEBEB;
  --color-border-secondary:#D4D4D4;
  --color-border-tertiary:#E0E0E0;
  --border-radius-lg:12px;
  --border-radius-md:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--color-background-primary);color:var(--color-text-primary);}
*{box-sizing:border-box;margin:0;padding:0;}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:400px;padding:2rem 1rem;text-align:center;}
.screen.active{display:flex;}
.q{font-size:26px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.5rem;line-height:1.4;}
.next-btn{padding:13px 44px;font-size:15px;border-radius:999px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;cursor:pointer;font-weight:500;margin-top:2rem;}
.next-btn:hover{opacity:.8;}
.restart-btn{padding:9px 24px;font-size:13px;border-radius:999px;background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);cursor:pointer;margin-top:1.25rem;}
.restart-btn:hover{background:var(--color-background-secondary);}
.age-btn{width:52px;height:52px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);font-size:22px;cursor:pointer;color:var(--color-text-primary);}
.age-btn:hover{background:var(--color-background-tertiary);}
.amt-btn{padding:18px 8px;border-radius:var(--border-radius-lg);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-size:15px;font-weight:500;cursor:pointer;color:var(--color-text-primary);line-height:1.4;}
.amt-btn.on{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;}
.chip{padding:9px 16px;border-radius:999px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-size:13px;cursor:pointer;color:var(--color-text-secondary);}
.chip.on{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;font-weight:500;}
.dots{display:flex;gap:8px;margin-bottom:2rem;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary);}
.dot.done{background:#1D9E75;}.dot.active{background:var(--color-text-primary);}
.scenario-toggle{display:flex;align-items:center;gap:10px;padding:11px 20px;border-radius:999px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;font-size:14px;color:var(--color-text-secondary);margin-top:1rem;}
.scenario-toggle.on{background:#FAEEDA;border-color:#BA7517;color:#854F0B;}
.scenario-toggle:hover{background:var(--color-background-tertiary);}
.scenario-toggle.on:hover{background:#FAC775;}
</style>
</head>
<body>

<h2 class="sr-only">NISAシミュレーター ステップ式</h2>

<div style="padding:1.5rem 1rem 1rem;max-width:720px;margin:0 auto;">
<div class="dots"><div class="dot active" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>

<div class="screen active" id="s1">
  <div class="q">今、おいくつですか？</div>
  <div style="display:flex;align-items:center;gap:24px;">
    <button class="age-btn" id="aminus">−</button>
    <div style="font-size:80px;font-weight:500;color:var(--color-text-primary);line-height:1;margin:0.5rem 0;min-width:120px;" id="adisp">30</div>
    <button class="age-btn" id="aplus">＋</button>
  </div>
  <div style="font-size:14px;color:var(--color-text-secondary);margin-top:0.75rem;" id="age-sub">65歳まであと <strong>35年</strong> あります</div>
  <button class="next-btn" id="next1">次へ →</button>
</div>

<div class="screen" id="s2">
  <div class="q">毎月いくら積み立てますか？</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:500px;">
    <button class="amt-btn" data-v="10000">1万円</button>
    <button class="amt-btn on" data-v="30000">3万円</button>
    <button class="amt-btn" data-v="50000">5万円</button>
    <button class="amt-btn" data-v="100000">10万円<br><span style="font-size:10px;opacity:.65;font-weight:400;">（上限）</span></button>
  </div>
  <div style="margin-top:2rem;width:100%;max-width:500px;text-align:left;">
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;">引き出すとしたら、いつ頃ですか？（複数選べます）</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;" id="chip-area"></div>
  </div>
  <button class="next-btn" id="next2">結果を見る →</button>
</div>

<div class="screen" id="s3">
  <div style="display:flex;gap:12px;width:100%;max-width:640px;margin-bottom:0.75rem;" id="r-cards">
    <div style="flex:1;background:#E1F5EE;border-radius:var(--border-radius-lg);padding:14px 16px;text-align:left;">
      <div style="font-size:11px;color:#0F6E56;margin-bottom:4px;">NISAで積み立てたら（65歳・年5%）</div>
      <div style="font-size:26px;font-weight:500;color:#0F6E56;" id="r-nisa">—</div>
    </div>
    <div style="flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px 16px;text-align:left;">
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;">銀行に預けたままなら（65歳）</div>
      <div style="font-size:26px;font-weight:500;color:var(--color-text-secondary);" id="r-bank">—</div>
    </div>
  </div>

  <div style="position:relative;width:100%;max-width:640px;height:230px;">
    <canvas id="chart" role="img" aria-label="NISAと銀行預金の資産推移比較">NISAと銀行預金の資産推移比較</canvas>
  </div>

  <div id="legend" style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--color-text-secondary);justify-content:center;"></div>

  <button class="scenario-toggle" id="scn-btn">
    <span id="scn-icon">☁</span>
    <span id="scn-label">不景気になったら？</span>
  </button>

  <div id="wd-table" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;width:100%;max-width:640px;justify-content:center;"></div>
  <button class="restart-btn" id="restart">↺ もう一度試す</button>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let age=30,monthly=30000;
let withdrawalAges=new Set();
let chart,scenarioMode=false;
const WD_COLS=['#5DCAA5','#1D9E75','#0F6E56','#085041'];

function fv(mo,rate,months){const r=rate/100/12;return r===0?mo*months:mo*((Math.pow(1+r,months)-1)/r);}
function fmt(y){const m=Math.round(y/10000);return m>=10000?(m/10000).toFixed(1)+'億円':m.toLocaleString()+'万円';}
function setDots(s){[1,2,3].forEach(i=>{const d=document.getElementById('d'+i);d.className='dot'+(i<s?' done':i===s?' active':'');});}
function show(n){['s1','s2','s3'].forEach((id,i)=>document.getElementById(id).classList.toggle('active',i+1===n));setDots(n);}

function updAge(){
  document.getElementById('adisp').textContent=age;
  document.getElementById('age-sub').innerHTML=`65歳まであと <strong>${65-age}年</strong> あります`;
}
document.getElementById('aminus').onclick=()=>{if(age>20){age--;updAge();}};
document.getElementById('aplus').onclick=()=>{if(age<60){age++;updAge();}};

document.querySelectorAll('.amt-btn').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('.amt-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');monthly=+b.dataset.v;};
});

function buildChips(){
  const area=document.getElementById('chip-area');area.innerHTML='';withdrawalAges.clear();
  const opts=[];
  [5,10,15].forEach(y=>{const wa=age+y;if(wa<65)opts.push({label:`${y}年後（${wa}歳）`,a:wa});});
  opts.push({label:'65歳まで',a:65,fixed:true});
  opts.forEach(({label,a,fixed})=>{
    withdrawalAges.add(a);
    const c=document.createElement('button');c.className='chip on';c.textContent=label;c.dataset.a=a;
    if(!fixed){c.onclick=()=>{c.classList.toggle('on');withdrawalAges[c.classList.contains('on')?'add':'delete'](a);};}
    else{c.style.cursor='default';c.style.opacity='.75';}
    area.appendChild(c);
  });
}
document.getElementById('next1').onclick=()=>{buildChips();show(2);};

const vLinePlugin={
  id:'vL',
  afterDraw(ch){
    const {ctx,chartArea:ca,scales}=ch;
    const lines=ch.config.options.plugins.vL?.lines||[];
    const n=ch.data.labels.length;
    lines.forEach(({idx,color,valLabel,yVal})=>{
      if(idx<0||idx>=n)return;
      const x=scales.x.getPixelForValue(idx);
      const yPx=scales.y.getPixelForValue(yVal);
      ctx.save();
      ctx.beginPath();ctx.moveTo(x,ca.top);ctx.lineTo(x,ca.bottom);
      ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
      ctx.beginPath();ctx.arc(x,yPx,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
      ctx.fillStyle=color;ctx.font='500 11px sans-serif';ctx.textAlign='center';
      ctx.fillText(valLabel,x,yPx-12);
      ctx.restore();
    });
  }
};
Chart.register(vLinePlugin);

let naArr=[],baArr=[],na2=[],na3=[],labels=[];

function buildChart(){
  const years=65-age;
  labels=[];naArr=[];baArr=[];na2=[];na3=[];
  for(let y=1;y<=years;y++){
    const m=y*12;
    labels.push((age+y)%5===0||y===years?(age+y)+'歳':'');
    naArr.push(Math.round(fv(monthly,5,m)/10000));
    na2.push(Math.round(fv(monthly,7,m)/10000));
    na3.push(Math.round(fv(monthly,2,m)/10000));
    baArr.push(Math.round(fv(monthly,0.1,m)/10000));
  }

  document.getElementById('r-nisa').textContent=fmt(fv(monthly,5,years*12));
  document.getElementById('r-bank').textContent=fmt(fv(monthly,0.1,years*12));

  const sorted=[...withdrawalAges].sort((a,b)=>a-b);
  const vLines=sorted.map((wa,i)=>({idx:wa-age-1,color:WD_COLS[i%4],valLabel:fmt(naArr[wa-age-1]*10000),yVal:naArr[wa-age-1]}));

  const tbl=document.getElementById('wd-table');tbl.innerHTML='';
  sorted.forEach((wa,i)=>{
    const idx=wa-age-1;
    const d=document.createElement('div');
    if(scenarioMode){
      d.style.cssText=`border-radius:var(--border-radius-md);padding:10px 14px;background:var(--color-background-secondary);text-align:left;min-width:150px;border-left:3px solid #888;`;
      d.innerHTML=`<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;">${wa-age}年後（${wa}歳）</div>
<div style="font-size:13px;font-weight:500;color:#1D9E75;">好調（7%）: ${fmt(na2[idx]*10000)}</div>
<div style="font-size:13px;font-weight:500;color:#378ADD;margin-top:3px;">普通（5%）: ${fmt(naArr[idx]*10000)}</div>
<div style="font-size:13px;font-weight:500;color:#BA7517;margin-top:3px;">不景気（2%）: ${fmt(na3[idx]*10000)}</div>
<div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px;">銀行（0.1%）: ${fmt(baArr[idx]*10000)}</div>`;
    }else{
      d.style.cssText=`border-radius:var(--border-radius-md);padding:10px 14px;background:var(--color-background-secondary);text-align:center;min-width:120px;border-left:3px solid ${WD_COLS[i%4]};`;
      d.innerHTML=`<div style="font-size:11px;color:var(--color-text-secondary);">${wa-age}年後（${wa}歳）</div>
<div style="font-size:17px;font-weight:500;color:${WD_COLS[i%4]};margin-top:3px;">${fmt(naArr[idx]*10000)}</div>
<div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px;">銀行: ${fmt(baArr[idx]*10000)}</div>`;
    }
    tbl.appendChild(d);
  });

  const normalDatasets=[
    {label:'NISA（年5%）',data:naArr,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.1)',fill:true,tension:0.35,borderWidth:2.5,pointRadius:0},
    {label:'銀行預金',data:baArr,borderColor:'#B4B2A9',backgroundColor:'transparent',fill:false,tension:0.2,borderWidth:1.5,borderDash:[5,4],pointRadius:0}
  ];

  const scenarioDatasets=[
    {label:'好調（年7%）',data:na2,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.07)',fill:true,tension:0.35,borderWidth:2,pointRadius:0},
    {label:'普通（年5%）',data:naArr,borderColor:'#378ADD',backgroundColor:'transparent',fill:false,tension:0.35,borderWidth:2,borderDash:[],pointRadius:0},
    {label:'不景気（年2%）',data:na3,borderColor:'#BA7517',backgroundColor:'transparent',fill:false,tension:0.35,borderWidth:2,borderDash:[4,3],pointRadius:0},
    {label:'銀行預金（0.1%）',data:baArr,borderColor:'#B4B2A9',backgroundColor:'transparent',fill:false,tension:0.2,borderWidth:1.5,borderDash:[5,4],pointRadius:0}
  ];

  function buildLegend(datasets){
    const el=document.getElementById('legend');el.innerHTML='';
    datasets.forEach(ds=>{
      const span=document.createElement('span');
      span.style.cssText='display:flex;align-items:center;gap:5px;';
      const dot=document.createElement('span');
      dot.style.cssText=`width:20px;height:3px;background:${ds.borderColor};border-radius:2px;display:inline-block;${ds.borderDash?.length?'background:none;border-top:2px dashed '+ds.borderColor+';':''}`;
      span.appendChild(dot);
      const txt=document.createElement('span');txt.textContent=ds.label;
      span.appendChild(txt);el.appendChild(span);
    });
  }

  if(chart)chart.destroy();
  const currentDS=scenarioMode?scenarioDatasets:normalDatasets;
  buildLegend(currentDS);

  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{labels,datasets:currentDS},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:900,easing:'easeInOutQuart'},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw.toLocaleString()+'万円'}},
        vL:{lines:vLines}
      },
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:0,font:{size:10},color:'#888'},grid:{display:false},border:{color:'rgba(128,128,128,0.2)'}},
        y:{ticks:{callback:v=>v.toLocaleString()+'万',font:{size:10},color:'#888'},grid:{color:'rgba(128,128,128,0.1)'},border:{display:false}}
      }
    }
  });

  document.getElementById('wd-table').style.display='flex';
}

document.getElementById('next2').onclick=()=>{scenarioMode=false;show(3);buildChart();};

document.getElementById('scn-btn').onclick=()=>{
  scenarioMode=!scenarioMode;
  const btn=document.getElementById('scn-btn');
  btn.classList.toggle('on',scenarioMode);
  document.getElementById('scn-icon').textContent=scenarioMode?'☀':'☁';
  document.getElementById('scn-label').textContent=scenarioMode?'通常シナリオに戻す':'不景気になったら？';
  buildChart();
};

document.getElementById('restart').onclick=()=>{
  age=30;monthly=30000;scenarioMode=false;updAge();
  document.querySelectorAll('.amt-btn').forEach(b=>b.classList.toggle('on',b.dataset.v==='30000'));
  document.getElementById('scn-btn').classList.remove('on');
  document.getElementById('scn-icon').textContent='☁';
  document.getElementById('scn-label').textContent='不景気になったら？';
  show(1);
};
updAge();
</script>
</body>
</html>
