<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ドルコスト平均法とは？（ステップ解説）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1A1A1A;}
.wrap{max-width:960px;margin:0 auto;padding:1rem 1.5rem;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid #eee;}
.header-title{font-size:18px;font-weight:600;}
.back{font-size:12px;color:#6B6B6B;text-decoration:none;}
.back:hover{color:#1D9E75;}
.body{display:flex;flex-direction:column;gap:16px;}
@media(min-width:768px){.body{flex-direction:row;gap:24px;height:560px;align-items:stretch;}}
.left{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}
.pattern-box{flex:1;border:1.5px solid #E0E0E0;border-radius:12px;padding:12px;display:flex;flex-direction:column;opacity:0.3;transition:opacity 0.3s;}
.pattern-box.visible{opacity:1;}
.pattern-box.b{border-color:#1D9E75;background:#f7fdf9;}
.pattern-label{font-size:11px;font-weight:600;color:#888;margin-bottom:8px;letter-spacing:0.04em;}
.pattern-label.green{color:#1D9E75;}
.months{display:flex;gap:8px;flex:1;align-items:flex-end;}
.month-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.month-apples{height:140px;display:flex;flex-direction:column-reverse;align-items:center;overflow:hidden;font-size:13px;line-height:1.15;}
.month-count{font-size:10px;color:#aaa;}
.month-name{font-size:10px;color:#aaa;}
.pattern-summary{font-size:12px;margin-top:8px;color:#6B6B6B;}
.pattern-summary.green{color:#1D9E75;font-weight:500;}
.right{width:100%;display:flex;flex-direction:column;gap:10px;}
@media(min-width:768px){.right{width:268px;flex-shrink:0;}}
.amt-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.amt-btn{padding:12px 4px;border-radius:10px;background:#F5F5F5;border:0.5px solid #E0E0E0;font-size:13px;font-weight:500;cursor:pointer;color:#1A1A1A;line-height:1.3;text-align:center;}
.amt-btn.on{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;}
/* ステップボタン */
.step-list{display:flex;flex-direction:column;gap:6px;flex:1;}
.step-item{display:flex;align-items:center;gap:8px;}
.step-num{width:24px;height:24px;border-radius:50%;background:#E0E0E0;color:#999;font-size:12px;font-weight:700;text-align:center;line-height:24px;flex-shrink:0;transition:background 0.2s,color 0.2s;}
.step-num.done{background:#1D9E75;color:#fff;}
.step-btn{flex:1;padding:10px 12px;border-radius:10px;background:#F5F5F5;border:0.5px solid #E0E0E0;font-size:13px;font-weight:500;cursor:pointer;color:#1A1A1A;text-align:left;transition:background 0.2s,border-color 0.2s;}
.step-btn:disabled{cursor:default;color:#bbb;background:#fafafa;}
.step-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.step-btn.done{background:#E1F5EE;color:#0F6E56;border-color:#1D9E75;}
.result-card{border:1.5px solid #E0E0E0;border-radius:12px;padding:14px;display:none;flex-direction:column;gap:0;}
.result-card.visible{display:flex;}
.result-title{font-size:12px;color:#888;margin-bottom:10px;}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid #F0F0F0;font-size:13px;}
.result-row:last-of-type{border-bottom:none;}
.result-val{font-weight:600;}
.result-val.green{color:#1D9E75;}
.winner{background:#E1F5EE;border-radius:8px;padding:10px;text-align:center;margin-top:10px;}
.winner-main{font-size:14px;font-weight:600;color:#0F6E56;}
.winner-sub{font-size:11px;color:#1D9E75;margin-top:2px;}
.retry-btn{padding:9px;border-radius:99px;background:transparent;border:0.5px solid #D4D4D4;font-size:13px;color:#6B6B6B;cursor:pointer;width:100%;display:none;}
.retry-btn.visible{display:block;}
.retry-btn:hover{background:#F5F5F5;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-title">🍎 ドルコスト平均法って何？</div>
    <a class="back" href="index.html">← メニューに戻る</a>
  </div>

  <div class="body">
    <!-- 左：リンゴ表示 -->
    <div class="left">
      <div class="pattern-box" id="box-a">
        <div class="pattern-label">パターン A ｜ 毎月同じ個数を買う</div>
        <div class="months" id="months-a"></div>
        <div class="pattern-summary" id="summary-a"></div>
      </div>
      <div class="pattern-box b" id="box-b">
        <div class="pattern-label green">パターン B ｜ 毎月同じ金額で買う（ドルコスト）</div>
        <div class="months" id="months-b"></div>
        <div class="pattern-summary green" id="summary-b"></div>
      </div>
    </div>

    <!-- 右：ステップ操作カラム -->
    <div class="right">
      <div>
        <div style="font-size:12px;color:#888;margin-bottom:8px;">毎月の購入金額</div>
        <div class="amt-row" id="amt-row">
          <button class="amt-btn" data-v="10000">1万円</button>
          <button class="amt-btn on" data-v="30000">3万円</button>
          <button class="amt-btn" data-v="50000">5万円</button>
          <button class="amt-btn" data-v="100000">10万円</button>
        </div>
      </div>

      <div class="step-list">
        <div class="step-item">
          <div class="step-num" id="sn1">1</div>
          <button class="step-btn active" id="sb1" onclick="doStep1()">🎲 相場を作る</button>
        </div>
        <div class="step-item">
          <div class="step-num" id="sn2">2</div>
          <button class="step-btn" id="sb2" disabled onclick="doStep2()">毎月同じ個数で買うと？</button>
        </div>
        <div class="step-item">
          <div class="step-num" id="sn3">3</div>
          <button class="step-btn" id="sb3" disabled onclick="doStep3()">毎月同じ金額で買うと？</button>
        </div>
        <div class="step-item">
          <div class="step-num" id="sn4">4</div>
          <button class="step-btn" id="sb4" disabled onclick="doStep4()">比べてみると？</button>
        </div>
      </div>

      <div class="result-card" id="result-card">
        <div class="result-title">6ヶ月後の比較</div>
        <div class="result-row"><span>定量購入の合計</span><span class="result-val" id="r-total-a">—</span></div>
        <div class="result-row"><span>定額購入の合計</span><span class="result-val green" id="r-total-b">—</span></div>
        <div class="result-row"><span>平均単価（定量）</span><span class="result-val" id="r-avg-a">—</span></div>
        <div class="result-row"><span>平均単価（定額）</span><span class="result-val green" id="r-avg-b">—</span></div>
        <div class="winner">
          <div class="winner-main" id="winner-main">—</div>
          <div class="winner-sub" id="winner-sub">—</div>
        </div>
      </div>

      <button class="retry-btn" id="retry-btn" onclick="reset()">↺ もう一度試す</button>
    </div>
  </div>
</div>
<script>
let monthly = 30000;
let prices = [];
let calcAResult = null;
let calcBResult = null;
let maxCount = 0;

document.querySelectorAll('.amt-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.amt-btn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    monthly = +b.dataset.v;
  };
});

function randomPrices() {
  return Array.from({length: 6}, () => Math.floor(Math.random() * 151) + 50);
}

function calcA(monthly, prices) {
  const qty = Math.round(monthly / prices[0]);
  const total = qty * 6;
  const spend = prices.reduce((s, p) => s + qty * p, 0);
  const avg = Math.round(spend / total);
  return { qty, total, spend, avg, counts: Array(6).fill(qty) };
}

function calcB(monthly, prices) {
  const counts = prices.map(p => Math.floor(monthly / p));
  const total = counts.reduce((s, n) => s + n, 0);
  const spend = monthly * 6;
  const avg = Math.round(spend / total);
  return { total, spend, avg, counts };
}

function appleHtmlScaled(count) {
  const visual = Math.max(1, Math.round((count / maxCount) * 10));
  return '🍎'.repeat(visual);
}

function priceBadge(price, avg) {
  const cheap = price <= avg;
  const bg = cheap ? '#1D9E75' : '#E07B54';
  return `<span style="display:inline-block;background:${bg};color:#fff;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600">${price}円</span>`;
}

const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月'];

function renderMonths(containerId, counts, avgPrice) {
  const container = document.getElementById(containerId);
  container.innerHTML = MONTH_NAMES.map((m, i) => `
    <div class="month-col">
      <div class="month-apples">${appleHtmlScaled(counts[i])}</div>
      <div class="month-count">${counts[i].toLocaleString()}個</div>
      ${priceBadge(prices[i], avgPrice)}
      <div class="month-name">${m}</div>
    </div>
  `).join('');
}

function renderPricesOnly() {
  ['months-a','months-b'].forEach(id => {
    const container = document.getElementById(id);
    container.innerHTML = MONTH_NAMES.map((m, i) => {
      const avgPrice = Math.round(prices.reduce((s,p)=>s+p,0)/prices.length);
      return `<div class="month-col">
        <div class="month-apples"></div>
        <div class="month-count"></div>
        ${priceBadge(prices[i], avgPrice)}
        <div class="month-name">${m}</div>
      </div>`;
    }).join('');
  });
}

function setStepDone(n) {
  document.getElementById('sn'+n).classList.add('done');
  document.getElementById('sb'+n).classList.remove('active');
  document.getElementById('sb'+n).classList.add('done');
  document.getElementById('sb'+n).disabled = true;
}

function activateStep(n) {
  document.getElementById('sb'+n).disabled = false;
  document.getElementById('sb'+n).classList.add('active');
}

function doStep1() {
  prices = randomPrices();
  calcAResult = calcA(monthly, prices);
  calcBResult = calcB(monthly, prices);
  maxCount = Math.max(...calcAResult.counts, ...calcBResult.counts);
  renderPricesOnly();
  document.getElementById('box-a').classList.add('visible');
  document.getElementById('box-b').classList.add('visible');
  setStepDone(1);
  activateStep(2);
}

function doStep2() {
  const avgPrice = Math.round(prices.reduce((s,p)=>s+p,0)/prices.length);
  renderMonths('months-a', calcAResult.counts, avgPrice);
  document.getElementById('summary-a').textContent =
    `合計 ${calcAResult.total}個 ／ 平均単価 ${calcAResult.avg}円`;
  setStepDone(2);
  activateStep(3);
}

function doStep3() {
  const avgPrice = Math.round(prices.reduce((s,p)=>s+p,0)/prices.length);
  renderMonths('months-b', calcBResult.counts, avgPrice);
  document.getElementById('summary-b').textContent =
    `合計 ${calcBResult.total}個 ／ 平均単価 ${calcBResult.avg}円`;
  setStepDone(3);
  activateStep(4);
}

function doStep4() {
  document.getElementById('r-total-a').textContent = `${calcAResult.total}個`;
  document.getElementById('r-total-b').textContent = `${calcBResult.total}個`;
  document.getElementById('r-avg-a').textContent = `${calcAResult.avg}円`;
  document.getElementById('r-avg-b').textContent = `${calcBResult.avg}円`;

  const diff = calcBResult.total - calcAResult.total;
  const avgDiff = calcAResult.avg - calcBResult.avg;
  const bWins = diff > 0;

  const winner = document.getElementById('winner');
  winner.style.background = bWins ? '#E1F5EE' : '#FEF3C7';
  const wMain = document.getElementById('winner-main');
  const wSub = document.getElementById('winner-sub');
  wMain.style.color = bWins ? '#0F6E56' : '#92400E';
  wSub.style.color = bWins ? '#1D9E75' : '#B45309';
  wMain.textContent = bWins
    ? `定額購入で${diff}個多く買えた！`
    : `今回は定量購入が${Math.abs(diff)}個多い`;
  wSub.textContent = bWins
    ? `平均単価が${avgDiff}円お得`
    : `相場によっては定量が有利なこともあります`;

  document.getElementById('r-total-a').className = `result-val${bWins ? '' : ' green'}`;
  document.getElementById('r-total-b').className = `result-val${bWins ? ' green' : ''}`;
  document.getElementById('r-avg-a').className = `result-val${bWins ? '' : ' green'}`;
  document.getElementById('r-avg-b').className = `result-val${bWins ? ' green' : ''}`;

  document.getElementById('result-card').classList.add('visible');
  setStepDone(4);
  document.getElementById('retry-btn').classList.add('visible');
}

function reset() {
  prices = [];
  calcAResult = null;
  calcBResult = null;
  maxCount = 0;
  ['months-a','months-b'].forEach(id => document.getElementById(id).innerHTML = '');
  ['summary-a','summary-b'].forEach(id => document.getElementById(id).textContent = '');
  ['box-a','box-b'].forEach(id => document.getElementById(id).classList.remove('visible'));
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('retry-btn').classList.remove('visible');
  [1,2,3,4].forEach(n => {
    document.getElementById('sn'+n).classList.remove('done');
    document.getElementById('sb'+n).classList.remove('done','active');
    document.getElementById('sb'+n).disabled = true;
  });
  document.getElementById('sb1').classList.add('active');
  document.getElementById('sb1').disabled = false;
  document.querySelectorAll('.amt-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.v === String(monthly));
  });
}
</script>
</body>
</html>
