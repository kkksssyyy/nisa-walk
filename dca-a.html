<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ドルコスト平均法とは？</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1A1A1A;}
.wrap{max-width:960px;margin:0 auto;padding:1rem 1.5rem;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid #eee;}
.header-title{font-size:18px;font-weight:600;}
.back{font-size:12px;color:#6B6B6B;text-decoration:none;}
.back:hover{color:#1D9E75;}
/* iPad横向きレイアウト */
.body{display:flex;flex-direction:column;gap:16px;}
@media(min-width:768px){.body{flex-direction:row;gap:24px;height:560px;align-items:stretch;}}
/* 左：リンゴエリア */
.left{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}
.pattern-box{flex:1;border:1.5px solid #E0E0E0;border-radius:12px;padding:12px;display:flex;flex-direction:column;}
.pattern-box.b{border-color:#1D9E75;background:#f7fdf9;}
.pattern-label{font-size:11px;font-weight:600;color:#888;margin-bottom:8px;letter-spacing:0.04em;}
.pattern-label.green{color:#1D9E75;}
.months{display:flex;gap:8px;flex:1;align-items:flex-end;}
.month-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.month-apples{height:140px;display:flex;flex-direction:column-reverse;align-items:center;overflow:hidden;font-size:13px;line-height:1.15;}
.month-count{font-size:10px;color:#aaa;}
.month-name{font-size:10px;color:#aaa;}
.pattern-summary{font-size:12px;margin-top:8px;color:#6B6B6B;}
.pattern-summary.green{color:#1D9E75;font-weight:500;}
/* 右：操作カラム */
.right{width:100%;display:flex;flex-direction:column;gap:12px;}
@media(min-width:768px){.right{width:268px;flex-shrink:0;}}
.sel-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.sel-btn{padding:12px 4px;border-radius:10px;background:#F5F5F5;border:0.5px solid #E0E0E0;font-size:13px;font-weight:500;cursor:pointer;color:#1A1A1A;line-height:1.3;text-align:center;}
.sel-btn.on{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;}
.gen-btn{padding:13px;border-radius:99px;background:#1D9E75;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;width:100%;}
.gen-btn:hover{opacity:.85;}
.result-card{border:1.5px solid #E0E0E0;border-radius:12px;padding:14px;flex:1;display:flex;flex-direction:column;gap:0;}
.result-card.hidden{display:none;}
.result-title{font-size:12px;color:#888;margin-bottom:10px;}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid #F0F0F0;font-size:13px;}
.result-row:last-of-type{border-bottom:none;}
.result-val{font-weight:600;}
.result-val.green{color:#1D9E75;}
.winner{background:#E1F5EE;border-radius:8px;padding:10px;text-align:center;margin-top:10px;}
.winner-main{font-size:14px;font-weight:600;color:#0F6E56;}
.winner-sub{font-size:11px;color:#1D9E75;margin-top:2px;}
.hint{font-size:12px;color:#aaa;text-align:center;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-title">🍎 ドルコスト平均法って何？</div>
    <a class="back" href="index.html">← メニューに戻る</a>
  </div>

  <div class="body">
    <!-- 左：リンゴ表示 -->
    <div class="left">
      <div class="pattern-box" id="box-a">
        <div class="pattern-label">パターン A ｜ 毎月同じ個数を買う</div>
        <div class="months" id="months-a"></div>
        <div class="pattern-summary" id="summary-a"></div>
      </div>
      <div class="pattern-box b" id="box-b">
        <div class="pattern-label green">パターン B ｜ 毎月同じ金額で買う（ドルコスト）</div>
        <div class="months" id="months-b"></div>
        <div class="pattern-summary green" id="summary-b"></div>
      </div>
    </div>

    <!-- 右：操作カラム -->
    <div class="right">
      <div>
        <div style="font-size:12px;color:#888;margin-bottom:8px;">毎月の購入金額</div>
        <div class="sel-row">
          <button class="sel-btn" data-amt="10000">1万円</button>
          <button class="sel-btn on" data-amt="30000">3万円</button>
          <button class="sel-btn" data-amt="50000">5万円</button>
          <button class="sel-btn" data-amt="100000">10万円</button>
        </div>
      </div>
      <div>
        <div style="font-size:12px;color:#888;margin-bottom:8px;">シミュレーション期間</div>
        <div class="sel-row">
          <button class="sel-btn on" data-period="6">6ヶ月</button>
          <button class="sel-btn" data-period="60">5年</button>
          <button class="sel-btn" data-period="120">10年</button>
          <button class="sel-btn" data-period="180">15年</button>
        </div>
      </div>
      <button class="gen-btn" id="gen-btn">🎲 相場をランダムに作る</button>
      <div class="result-card hidden" id="result-card">
        <div class="result-title" id="result-title">6ヶ月後の比較</div>
        <div class="result-row"><span>定量購入の合計</span><span class="result-val" id="r-total-a">—</span></div>
        <div class="result-row"><span>定額購入の合計</span><span class="result-val green" id="r-total-b">—</span></div>
        <div class="result-row"><span>平均単価（定量）</span><span class="result-val" id="r-avg-a">—</span></div>
        <div class="result-row"><span>平均単価（定額）</span><span class="result-val green" id="r-avg-b">—</span></div>
        <div class="winner" id="winner">
          <div class="winner-main" id="winner-main">—</div>
          <div class="winner-sub" id="winner-sub">—</div>
        </div>
      </div>
      <div class="hint" id="hint">↑ ボタンを押すとランダムな相場で試せます</div>
    </div>
  </div>
</div>
<script>
let monthly = 30000;
let periods = 6;

document.querySelectorAll('[data-amt]').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('[data-amt]').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    monthly = +b.dataset.amt;
  };
});

document.querySelectorAll('[data-period]').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('[data-period]').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    periods = +b.dataset.period;
  };
});

function randomPrices(n) {
  return Array.from({length: n}, () => Math.floor(Math.random() * 151) + 50);
}

function calcA(monthly, prices) {
  const qty = Math.round(monthly / prices[0]);
  const n = prices.length;
  const total = qty * n;
  const spend = prices.reduce((s, p) => s + qty * p, 0);
  const avg = Math.round(spend / total);
  return { qty, total, spend, avg, counts: Array(n).fill(qty) };
}

function calcB(monthly, prices) {
  const counts = prices.map(p => Math.floor(monthly / p));
  const total = counts.reduce((s, x) => s + x, 0);
  const spend = monthly * prices.length;
  const avg = Math.round(spend / total);
  return { total, spend, avg, counts };
}

// Group n months of data into 6 visual columns
function makeGroups(counts, prices, n) {
  const size = n / 6;
  return Array.from({length: 6}, (_, g) => {
    const c = counts.slice(g * size, (g + 1) * size);
    const p = prices.slice(g * size, (g + 1) * size);
    const total = c.reduce((s, v) => s + v, 0);
    const avgP = Math.round(p.reduce((s, v) => s + v, 0) / p.length);
    const end = (g + 1) * size;
    let label;
    if (size === 1) label = `${g+1}月`;
    else if (end % 12 === 0) label = `${end/12}年`;
    else label = `${end}ヶ月`;
    return { total, avgP, label };
  });
}

function appleHtmlScaled(count, maxCount) {
  const visual = Math.max(1, Math.round((count / maxCount) * 10));
  return '🍎'.repeat(visual);
}

function priceBadge(price, globalAvg) {
  const cheap = price <= globalAvg;
  const bg = cheap ? '#1D9E75' : '#E07B54';
  return `<span style="display:inline-block;background:${bg};color:#fff;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600">${price}円</span>`;
}

function renderGroups(containerId, groups, globalAvg, maxGroupCount) {
  const container = document.getElementById(containerId);
  container.innerHTML = groups.map(g => `
    <div class="month-col">
      <div class="month-apples">${appleHtmlScaled(g.total, maxGroupCount)}</div>
      <div class="month-count">${g.total.toLocaleString()}個</div>
      ${priceBadge(g.avgP, globalAvg)}
      <div class="month-name">${g.label}</div>
    </div>
  `).join('');
}

document.getElementById('gen-btn').onclick = () => {
  const prices = randomPrices(periods);
  const globalAvg = Math.round(prices.reduce((s,p)=>s+p,0)/prices.length);
  const a = calcA(monthly, prices);
  const b = calcB(monthly, prices);

  const groupsA = makeGroups(a.counts, prices, periods);
  const groupsB = makeGroups(b.counts, prices, periods);
  const maxGroupCount = Math.max(...groupsA.map(g=>g.total), ...groupsB.map(g=>g.total));

  renderGroups('months-a', groupsA, globalAvg, maxGroupCount);
  renderGroups('months-b', groupsB, globalAvg, maxGroupCount);

  document.getElementById('summary-a').textContent = `合計 ${a.total.toLocaleString()}個 ／ 平均単価 ${a.avg}円 ／ 総支出 ${(a.spend/10000).toFixed(1)}万円`;
  document.getElementById('summary-b').textContent = `合計 ${b.total.toLocaleString()}個 ／ 平均単価 ${b.avg}円 ／ 総支出 ${(b.spend/10000).toFixed(1)}万円`;

  document.getElementById('r-total-a').textContent = `${a.total.toLocaleString()}個`;
  document.getElementById('r-total-b').textContent = `${b.total.toLocaleString()}個`;
  document.getElementById('r-avg-a').textContent = `${a.avg}円`;
  document.getElementById('r-avg-b').textContent = `${b.avg}円`;

  const periodLabel = periods === 60 ? '5年後' : periods === 120 ? '10年後' : periods === 180 ? '15年後' : `${periods}ヶ月後`;
  document.getElementById('result-title').textContent = `${periodLabel}の比較`;

  const avgDiff = a.avg - b.avg;

  const winner = document.getElementById('winner');
  winner.style.background = '#E1F5EE';
  const wMain = document.getElementById('winner-main');
  const wSub = document.getElementById('winner-sub');
  wMain.style.color = '#0F6E56';
  wSub.style.color = '#1D9E75';
  wMain.textContent = avgDiff > 0
    ? `定額購入の平均単価が${avgDiff}円安い！`
    : `今回は平均単価が同じでした`;
  wSub.textContent = avgDiff > 0
    ? `同じ金額でより効率よく買えました`
    : `価格変動がなければ差は出ません`;

  document.getElementById('r-total-a').className = 'result-val';
  document.getElementById('r-total-b').className = 'result-val';
  document.getElementById('r-avg-a').className = 'result-val';
  document.getElementById('r-avg-b').className = 'result-val green';

  document.getElementById('result-card').classList.remove('hidden');
  document.getElementById('hint').style.display = 'none';
};
</script>
</body>
</html>
